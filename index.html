<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Street Mode</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="script.js" defer></script>

<style>
body { font-family: Arial; margin: 0; }

header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

nav a, nav button {
  color: white;
  margin-left: 15px;
  text-decoration: none;
  background: none;
  border: none;
  cursor: pointer;
}

.products {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  width: 200px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h2>Street Mode</h2>
  <nav>
    <a href="#">Home</a>
    <button onclick="viewCart()">Cart 🛒</button>
  </nav>
</header>

<div class="products">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="https://static.yourprint.in/new-admin-ajax.php?action=resize_outer_image&cfcache=all&url=https%3A%2F%2Fwww.yourprint.in%2Fwp-content%2Fuploads%2F2024%2F01%2Fblack-2.jpg&resizeTo=300&format=webp">
    <h3> PRINTED T-SHIRT </h3>
    <p>₹399</p>

    <select id="size1">
      <option value="">Select Size</option>
      <option>S</option>
      <option>M</option>
      <option>L</option>
    </select>

    <button onclick="buyProduct('Printed T-Shirt', 399, 'size1')">
      Add to Cart
    </button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <img src="https://m.media-amazon.com/images/I/51gBz8XZHjL._SY741_.jpg">
    <h3>Cargo Pants</h3>
    <p>₹799</p>

    <select id="size2">
      <option value="">Select Size</option>
      <option>S</option>
      <option>M</option>
      <option>L</option>
    </select>

    <button onclick="buyProduct('Cargo Pants', 799, 'size2')">
      Add to Cart
    </button>
  </div>

</div>

</body>
</html>
