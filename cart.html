<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
</head>

<body>

<h1>Your Cart 🛒</h1>

<div id="cart"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let box = document.getElementById("cart");

if(cart.length === 0){
  box.innerHTML = "Cart is empty";
} else {
  let total = 0;

  cart.forEach(item => {
    box.innerHTML += item.name + " - ₹" + item.price + "<br>";
    total += item.price;
  });

  box.innerHTML += "<br><b>Total: ₹" + total + "</b>";
}
</script>

</body>
</html>
